<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coco Bambu">
<meta name="theme-color" content="#0d0f17">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="icon" sizes="512x512" href="icon-512.png">

<title>Frequência Salão — Coco Bambu</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0d0f17;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Safe area (notch) */
body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* Remove highlight */
* {
  -webkit-tap-highlight-color: transparent;
}

/* Layout base */
.app {
  padding: 16px;
  color: #fff;
}

.header {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}

.card {
  background: #151822;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  border: 1px solid #222;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">Frequência Salão — Coco Bambu</div>

  <div class="card">
    ✔ Sistema rodando em modo app
  </div>

  <div class="card">
    ✔ Tela cheia ativada
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registrado'))
      .catch(err => console.log('Erro SW', err));
  });
}
</script>

</body>
</html>
